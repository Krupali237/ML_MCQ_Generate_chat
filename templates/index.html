{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl w-full mx-auto space-y-12">
    <div class="text-center space-y-4">
        <h1 class="text-5xl font-extrabold gradient-text tracking-tight sm:text-6xl py-2">
            AI-Powered Document Assistant
        </h1>
        <p class="text-xl text-gray-600 font-light">
            Upload your PDF or PPTX. Chat with your document or generate intelligent MCQs in seconds.
        </p>
    </div>

    <div class="bg-white/80 glass shadow-2xl rounded-3xl p-10 border border-gray-100 transition-all hover:shadow-indigo-100 mt-10">
        <form id="uploadForm" class="space-y-6">
            <div class="flex items-center justify-center w-full">
                <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-64 border-2 border-dashed border-indigo-300 rounded-2xl cursor-pointer bg-indigo-50/50 hover:bg-indigo-50 transition p-6 group">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                        <i class="fas fa-cloud-upload-alt text-5xl text-indigo-400 group-hover:text-indigo-500 mb-4 transition-transform group-hover:scale-110"></i>
                        <p class="mb-2 text-xl font-semibold text-gray-700">Click to upload or drag and drop</p>
                        <p class="text-sm text-gray-500">PDF or PPTX </p>
                    </div>
                    <input id="dropzone-file" type="file" name="document" class="hidden" accept=".pdf,.pptx" required />
                </label>
            </div>
            
            <div id="file-info" class="hidden text-center text-sm font-medium text-indigo-600 bg-indigo-50 rounded-lg p-3 border border-indigo-100 shadow-sm"></div>
            
            <button type="submit" id="uploadBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold rounded-xl py-4 shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all disabled:opacity-50">
                <i class="fas fa-magic mr-2"></i> Process Document
            </button>
            <div id="loading" class="hidden text-center mt-4 text-gray-600 flex flex-col items-center">
                <i class="fas fa-circle-notch fa-spin text-3xl text-indigo-600 mb-2"></i>
                <p>Analyzing document & generating embeddings... Please wait.</p>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const fileInput = document.getElementById('dropzone-file');
    const fileInfo = document.getElementById('file-info');
    
    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) {
            fileInfo.textContent = `Selected: ${e.target.files[0].name}`;
            fileInfo.classList.remove('hidden');
        }
    });

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('document', file);

        document.getElementById('uploadBtn').classList.add('hidden');
        document.getElementById('loading').classList.remove('hidden');

        try {
            const response = await fetch('/upload_doc', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if (response.ok) {
                // Redirect to chat
                window.location.href = `/chat?doc_id=${data.doc_id}&session_id=${data.session_id}`;
            } else {
                if(window.showToast) window.showToast(data.error || 'Upload failed', 'error');
                else alert(data.error || 'Upload failed');
            }
        } catch (error) {
            if(window.showToast) window.showToast('An error occurred during upload.', 'error');
            else alert('An error occurred during upload.');
        } finally {
            document.getElementById('uploadBtn').classList.remove('hidden');
            document.getElementById('loading').classList.add('hidden');
        }
    });
</script>
{% endblock %}
