{% extends "base.html" %}
{% block content %}
<div class="max-w-xl w-full mx-auto bg-white rounded-3xl shadow-xl p-8 border border-gray-100 my-10 relative overflow-hidden">
    <!-- Decorative background blobs -->
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-purple-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
    <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-indigo-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
    
    <div class="relative z-10 text-center mb-8">
        <div class="h-16 w-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-full flex items-center justify-center text-white text-2xl mx-auto mb-4 shadow-lg">
            <i class="fas fa-list-ol"></i>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900">Quiz Generator</h2>
        <p class="text-gray-500 mt-2">Create multiple-choice questions from your document.</p>
    </div>

    <form id="mcqForm" class="relative z-10 space-y-6">
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Number of Questions</label>
            <input type="number" id="qCount" min="1" max="50" value="5" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Difficulty Level</label>
            <div class="grid grid-cols-3 gap-3">
                <label class="cursor-pointer">
                    <input type="radio" name="difficulty" value="Easy" class="peer sr-only">
                    <div class="text-center bg-gray-50 border border-gray-200 rounded-xl py-3 peer-checked:bg-green-100 peer-checked:border-green-500 peer-checked:text-green-700 font-medium transition">
                        Easy
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="difficulty" value="Medium" class="peer sr-only" checked>
                    <div class="text-center bg-gray-50 border border-gray-200 rounded-xl py-3 peer-checked:bg-yellow-100 peer-checked:border-yellow-500 peer-checked:text-yellow-700 font-medium transition">
                        Medium
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="difficulty" value="Hard" class="peer sr-only">
                    <div class="text-center bg-gray-50 border border-gray-200 rounded-xl py-3 peer-checked:bg-red-100 peer-checked:border-red-500 peer-checked:text-red-700 font-medium transition">
                        Hard
                    </div>
                </label>
            </div>
        </div>

        <button type="submit" id="genBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl py-4 shadow-lg hover:shadow-xl transition-all">
            <i class="fas fa-magic mr-2"></i> Generate MCQ Quiz
        </button>
        
        <div id="loadingInfo" class="hidden text-center text-indigo-600 mt-4 font-medium animate-pulse">
            <i class="fas fa-spinner fa-spin mr-2"></i> AI is reviewing content and crafting questions...
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('mcqForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const count = parseInt(document.getElementById('qCount').value);
        const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
        const btn = document.getElementById('genBtn');
        const load = document.getElementById('loadingInfo');
        
        btn.disabled = true;
        btn.classList.add('opacity-50');
        load.classList.remove('hidden');
        load.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Generating 0/${count} questions...`;

        try {
            const res = await fetch('/api/generate_mcq', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ doc_id: "{{ doc_id }}", count, difficulty })
            });

            if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.error || "Failed to generate MCQs");
            }
            
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, {stream: true});
                
                let lines = buffer.split('\n');
                buffer = lines.pop(); // keep the last incomplete chunk
                
                for (let line of lines) {
                    if (!line.trim()) continue;
                    try {
                        let data = JSON.parse(line);
                        if (data.status === 'progress') {
                            load.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> Generating ${data.generated}/${count} questions...`;
                        } else if (data.status === 'complete') {
                            window.location.href = `/quiz/${data.set_id}`;
                            return;
                        } else if (data.status === 'error') {
                            throw new Error(data.error);
                        }
                    } catch(err) {
                        console.error("Parse error:", err, line);
                    }
                }
            }
        } catch(e) {
            if(window.showToast) window.showToast(e.message || "Network Error", "error");
            else alert(e.message || "Network Error");
        } finally {
            btn.disabled = false;
            btn.classList.remove('opacity-50');
            load.classList.add('hidden');
            load.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> AI is reviewing content and crafting questions...`;
        }
    });
</script>
{% endblock %}
